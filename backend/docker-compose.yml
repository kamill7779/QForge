networks:
  qforge-remote-net:
    name: qforge-remote-net
    driver: bridge

services:
  export-sidecar:
    build:
      context: ./export-sidecar
      dockerfile: Dockerfile
    container_name: qforge-export-sidecar
    restart: unless-stopped
    networks: [qforge-remote-net]
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR}
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      SERVICE_PORT: 8092
      SERVICE_IP: ${APP_PUBLIC_HOST}
      NACOS_REGISTER_RETRIES: 30
      NACOS_REGISTER_RETRY_INTERVAL_SECONDS: 2
    ports:
      - "${EXPORT_SIDECAR_PORT}:8092"

  question-core-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: question-service
    container_name: question-core-service
    restart: unless-stopped
    networks: [qforge-remote-net]
    mem_limit: 768m
    mem_reservation: 384m
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8089
      SPRING_CLOUD_NACOS_DISCOVERY_IP: ${APP_PUBLIC_HOST}
      SPRING_CLOUD_NACOS_DISCOVERY_PORT: ${QUESTION_CORE_PORT}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS_QUESTION_CORE}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DB: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR}
      OCR_SERVICE_BASE_URL: http://ocr-service:8090
    ports:
      - "${QUESTION_CORE_PORT}:8089"

  question-basket-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: question-basket-service
    container_name: question-basket-service
    restart: unless-stopped
    networks: [qforge-remote-net]
    mem_limit: 384m
    mem_reservation: 256m
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8097
      SPRING_CLOUD_NACOS_DISCOVERY_IP: ${APP_PUBLIC_HOST}
      SPRING_CLOUD_NACOS_DISCOVERY_PORT: ${QUESTION_BASKET_PORT}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS_QUESTION_BASKET}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DB: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR}
    ports:
      - "${QUESTION_BASKET_PORT}:8097"

  exam-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: exam-service
    container_name: exam-service
    restart: unless-stopped
    networks: [qforge-remote-net]
    mem_limit: 768m
    mem_reservation: 384m
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8093
      SPRING_CLOUD_NACOS_DISCOVERY_IP: ${APP_PUBLIC_HOST}
      SPRING_CLOUD_NACOS_DISCOVERY_PORT: ${EXAM_PORT}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS_EXAM}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DB: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR}
      EXPORT_SIDECAR_DIRECT_URL: http://export-sidecar:8092
    ports:
      - "${EXAM_PORT}:8093"
    depends_on:
      export-sidecar:
        condition: service_started

  exam-parse-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: exam-parse-service
    container_name: exam-parse-service
    restart: unless-stopped
    networks: [qforge-remote-net]
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8094
      SPRING_CLOUD_NACOS_DISCOVERY_IP: ${APP_PUBLIC_HOST}
      SPRING_CLOUD_NACOS_DISCOVERY_PORT: ${EXAM_PARSE_PORT}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS_EXAM_PARSE}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DB: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR}
      QFORGE_STORAGE_COS_BUCKET: ${QFORGE_STORAGE_COS_BUCKET}
      QFORGE_STORAGE_COS_REGION: ${QFORGE_STORAGE_COS_REGION}
      QFORGE_STORAGE_COS_ENDPOINT: ${QFORGE_STORAGE_COS_ENDPOINT}
      QFORGE_STORAGE_COS_SECRET_ID: ${QFORGE_STORAGE_COS_SECRET_ID}
      QFORGE_STORAGE_COS_SECRET_KEY: ${QFORGE_STORAGE_COS_SECRET_KEY}
    ports:
      - "${EXAM_PARSE_PORT}:8094"

  ocr-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ocr-service
    container_name: ocr-service
    restart: unless-stopped
    networks: [qforge-remote-net]
    mem_limit: 1280m
    mem_reservation: 768m
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8090
      SPRING_CLOUD_NACOS_DISCOVERY_IP: ${APP_PUBLIC_HOST}
      SPRING_CLOUD_NACOS_DISCOVERY_PORT: ${OCR_PORT}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS_OCR}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DB: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR}
      GLM_OCR_ENDPOINT: ${GLM_OCR_ENDPOINT}
      GLM_OCR_MODEL: ${GLM_OCR_MODEL}
      GLM_OCR_API_KEY: ${GLM_OCR_API_KEY}
      GLM_OCR_PREFER_IPV4: "true"
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY}
      ZHIPUAI_MODEL: ${ZHIPUAI_MODEL}
      STEMXML_MODEL: ${STEMXML_MODEL}
      EXAMPARSE_AI_MODEL: ${EXAMPARSE_AI_MODEL}
      QFORGE_STORAGE_COS_BUCKET: ${QFORGE_STORAGE_COS_BUCKET}
      QFORGE_STORAGE_COS_REGION: ${QFORGE_STORAGE_COS_REGION}
      QFORGE_STORAGE_COS_ENDPOINT: ${QFORGE_STORAGE_COS_ENDPOINT}
      QFORGE_STORAGE_COS_SECRET_ID: ${QFORGE_STORAGE_COS_SECRET_ID}
      QFORGE_STORAGE_COS_SECRET_KEY: ${QFORGE_STORAGE_COS_SECRET_KEY}
    ports:
      - "${OCR_PORT}:8090"

  persist-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: persist-service
    container_name: persist-service
    restart: unless-stopped
    networks: [qforge-remote-net]
    mem_limit: 384m
    mem_reservation: 256m
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8091
      SPRING_CLOUD_NACOS_DISCOVERY_IP: ${APP_PUBLIC_HOST}
      SPRING_CLOUD_NACOS_DISCOVERY_PORT: ${PERSIST_PORT}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS_PERSIST}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DB: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR}
    ports:
      - "${PERSIST_PORT}:8091"

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway-service
    container_name: gateway-service
    restart: unless-stopped
    networks: [qforge-remote-net]
    mem_limit: 512m
    mem_reservation: 256m
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
      SPRING_CLOUD_NACOS_DISCOVERY_IP: ${APP_PUBLIC_HOST}
      SPRING_CLOUD_NACOS_DISCOVERY_PORT: ${GATEWAY_PORT}
      JAVA_TOOL_OPTIONS: ${JAVA_OPTS_GATEWAY}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      question-core-service:
        condition: service_started
      exam-service:
        condition: service_started
      question-basket-service:
        condition: service_started
      exam-parse-service:
        condition: service_started
