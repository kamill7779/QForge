networks:
  qforge-net:
    driver: bridge

services:
  mysql:
    image: mysql:8.4
    pull_policy: if_not_present
    container_name: qforge-mysql
    networks: [qforge-net]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qforge
      MYSQL_USER: qforge
      MYSQL_PASSWORD: qforge
    volumes:
      # Named volume — survives docker compose down (data persists)
      - mysql-data:/var/lib/mysql
      # Init script — only runs once when the data directory is empty
      - ./sql/init-schema.sql:/docker-entrypoint-initdb.d/init-schema.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    pull_policy: if_not_present
    container_name: qforge-redis
    networks: [qforge-net]
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    pull_policy: if_not_present
    container_name: qforge-rabbitmq
    networks: [qforge-net]
    ports:
      - "5672:5672"
      - "15672:15672"

  nacos:
    image: nacos/nacos-server:v2.4.1
    pull_policy: if_not_present
    container_name: qforge-nacos
    networks: [qforge-net]
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    volumes:
      # Named volume — Nacos 热配置在 docker compose down 后不丢失
      - nacos-data:/home/nacos/data
    ports:
      - "8848:8848"

  auth-service:
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
      pull: false
      args:
        SERVICE_NAME: auth-service
    container_name: auth-service
    networks: [qforge-net]
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    volumes:
      - ./.dev-logs:/app/logs
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: qforge
      MYSQL_USER: qforge
      MYSQL_PASSWORD: qforge
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      NACOS_SERVER_ADDR: nacos:8848
      JWT_SECRET: qforge-super-secret-key-please-change-in-production-1234567890
    ports:
      - "8088:8088"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      nacos:
        condition: service_started

  gateway-service:
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
      pull: false
      args:
        SERVICE_NAME: gateway-service
    container_name: gateway-service
    networks: [qforge-net]
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    volumes:
      - ./.dev-logs:/app/logs
    environment:
      SPRING_PROFILES_ACTIVE: dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      NACOS_SERVER_ADDR: nacos:8848
      JWT_SECRET: qforge-super-secret-key-please-change-in-production-1234567890
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_started
      question-service:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      nacos:
        condition: service_started

  question-service:
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
      pull: false
      args:
        SERVICE_NAME: question-service
    # container_name omitted — allows --scale question-service=N
    networks: [qforge-net]
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: qforge
      MYSQL_USER: qforge
      MYSQL_PASSWORD: qforge
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      NACOS_SERVER_ADDR: nacos:8848
      OCR_SERVICE_BASE_URL: http://ocr-service:8090
    # No fixed host port — gateway routes via Nacos lb://, supports multi-instance
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      nacos:
        condition: service_started

  persist-service:
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
      pull: false
      args:
        SERVICE_NAME: persist-service
    # container_name omitted — allows --scale persist-service=N
    networks: [qforge-net]
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    volumes:
      - ./.dev-logs:/app/logs
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: qforge
      MYSQL_USER: qforge
      MYSQL_PASSWORD: qforge
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      NACOS_SERVER_ADDR: nacos:8848
    # No fixed host port — MQ-driven consumer, supports multi-instance
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      nacos:
        condition: service_started

  ocr-service:
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
      pull: false
      args:
        SERVICE_NAME: ocr-service
    # container_name omitted — allows --scale ocr-service=N
    networks: [qforge-net]
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    volumes:
      - ./.dev-logs:/app/logs
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: qforge
      MYSQL_USER: qforge
      MYSQL_PASSWORD: qforge
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      NACOS_SERVER_ADDR: nacos:8848
      GLM_OCR_ENDPOINT: https://api.z.ai/api/paas/v4/layout_parsing
      GLM_OCR_MODEL: glm-ocr
      GLM_OCR_API_KEY: ${GLM_OCR_API_KEY}
      GLM_OCR_PREFER_IPV4: "true"
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY}
      ZHIPUAI_MODEL: glm-5
    # No fixed host port — supports multi-instance
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      nacos:
        condition: service_started

volumes:
  mysql-data:  # persistent: survives docker compose down; use down -v to wipe
  nacos-data:  # Nacos 热配置持久化，目录 /home/nacos/data
