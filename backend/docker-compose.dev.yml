# =============================================================================
# QForge DEV Docker Compose - cloud-native dev (one container per service)
# =============================================================================
# Usage:
#   cd backend
#   docker compose -f docker-compose.dev.yml up --build
# =============================================================================

x-service-base: &service-base
  image: maven:3.9.9-eclipse-temurin-17
  working_dir: /workspace
  volumes:
    - ./:/workspace
    - maven-repo:/root/.m2
  networks:
    - qforge-net

x-infra-env: &infra-env
  SPRING_PROFILES_ACTIVE: dev
  LOG_PATH: /workspace/.dev-logs
  MYSQL_HOST: mysql
  MYSQL_PORT: 3306
  MYSQL_DB: qforge
  MYSQL_USER: qforge
  MYSQL_PASSWORD: qforge
  REDIS_HOST: redis
  REDIS_PORT: 6379
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_USER: guest
  RABBITMQ_PASSWORD: guest
  NACOS_SERVER_ADDR: nacos:8848

services:
  # ========================= Infrastructure =========================
  mysql:
    image: mysql:8.4
    container_name: qforge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qforge
      MYSQL_USER: qforge
      MYSQL_PASSWORD: qforge
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - qforge-net

  redis:
    image: redis:7.4
    container_name: qforge-redis
    ports:
      - "6379:6379"
    networks:
      - qforge-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: qforge-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - qforge-net

  nacos:
    image: nacos/nacos-server:v2.4.1
    container_name: qforge-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
    networks:
      - qforge-net

  # ========================= Microservices =========================

  auth-service:
    <<: *service-base
    container_name: qforge-dev-auth
    volumes:
      - ./:/workspace
      - maven-repo:/root/.m2
      - ./.dev-logs:/workspace/.dev-logs
    environment:
      <<: *infra-env
      JWT_SECRET: qforge-super-secret-key-please-change-in-production-1234567890
    command: >
      bash -c "
        mvn -q -DskipTests -pl libs/common-contract install &&
        mvn -DskipTests -pl services/auth-service spring-boot:run -am
      "
    ports:
      - "8088:8088"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      nacos:
        condition: service_started

  ocr-service:
    <<: *service-base
    container_name: qforge-dev-ocr
    volumes:
      - ./:/workspace
      - maven-repo:/root/.m2
      - ./.dev-logs:/workspace/.dev-logs
    environment:
      <<: *infra-env
      GLM_OCR_ENDPOINT: https://api.z.ai/api/paas/v4/layout_parsing
      GLM_OCR_MODEL: glm-ocr
      GLM_OCR_API_KEY: ${GLM_OCR_API_KEY:-}
      GLM_OCR_PREFER_IPV4: "true"
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY:-}
      ZHIPUAI_MODEL: glm-5
    command: >
      bash -c "
        mvn -q -DskipTests -pl libs/common-contract install &&
        mvn -DskipTests -pl services/ocr-service spring-boot:run -am
      "
    ports:
      - "8090:8090"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      nacos:
        condition: service_started

  question-service:
    <<: *service-base
    container_name: qforge-dev-question
    volumes:
      - ./:/workspace
      - maven-repo:/root/.m2
    environment:
      <<: *infra-env
      OCR_SERVICE_BASE_URL: http://ocr-service:8090
    command: >
      bash -c "
        mvn -q -DskipTests -pl libs/common-contract install &&
        mvn -DskipTests -pl services/question-service spring-boot:run -am
      "
    ports:
      - "8089:8089"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      nacos:
        condition: service_started
      ocr-service:
        condition: service_started

  gateway-service:
    <<: *service-base
    container_name: qforge-dev-gateway
    volumes:
      - ./:/workspace
      - maven-repo:/root/.m2
      - ./.dev-logs:/workspace/.dev-logs
    environment:
      <<: *infra-env
      JWT_SECRET: qforge-super-secret-key-please-change-in-production-1234567890
    command: >
      bash -c "
        mvn -q -DskipTests -pl libs/common-contract install &&
        mvn -DskipTests -pl services/gateway-service spring-boot:run -am
      "
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_started
      question-service:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      nacos:
        condition: service_started

networks:
  qforge-net:
    driver: bridge

volumes:
  maven-repo:
