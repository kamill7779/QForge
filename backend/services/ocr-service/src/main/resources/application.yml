spring:
  application:
    name: ocr-service
  config:
    import:
      - optional:nacos:${spring.application.name}.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:qforge}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:qforge}
    password: ${MYSQL_PASSWORD:qforge}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 2000ms
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000ms

server:
  port: 8090

security:
  swagger-public: false

ocr:
  provider:
    glm:
      endpoint: ${GLM_OCR_ENDPOINT:https://api.z.ai/api/paas/v4/layout_parsing}
      model: ${GLM_OCR_MODEL:glm-ocr}
      api-key: ${GLM_OCR_API_KEY:}
      image-mime-type: ${GLM_OCR_IMAGE_MIME_TYPE:image/png}
      timeout-seconds: ${GLM_OCR_TIMEOUT_SECONDS:60}
      retry-max-attempts: ${GLM_OCR_RETRY_MAX_ATTEMPTS:3}
      retry-backoff-millis: ${GLM_OCR_RETRY_BACKOFF_MILLIS:800}
      prefer-ipv4: ${GLM_OCR_PREFER_IPV4:true}

# ZhipuAI reasoning model (tag/difficulty/analysis)
zhipuai:
  api-key: ${ZHIPUAI_API_KEY:}
  model: ${ZHIPUAI_MODEL:glm-5}
  temperature: 0.1
  max-tokens: 65536

# StemXml conversion model (fast/stable, non-reasoning)
stemxml:
  model: ${STEMXML_MODEL:glm-4-0520}
  temperature: 0.1
  max-tokens: 65536

# AnswerXml conversion model (independent from stemxml)
answerxml:
  model: ${ANSWERXML_MODEL:glm-4-0520}
  temperature: 0.1
  max-tokens: 65536

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

# Exam auto-parse LLM model (GLM-Z-Plus, 128K context)
examparse:
  ai:
    model: ${EXAMPARSE_AI_MODEL:glm-4-plus}
    temperature: 0.1
    max-tokens: 32768

# OCR 业务参数热配置 — 可在 Nacos 的 ocr-service.yml 中覆盖，无需重启
qforge:
  ocr:
    pdf-render-dpi: 300                # PDF 渲染 DPI
    llm-empty-retries: 2              # LLM 空内容重试次数
    ai-default-max-tokens: 65536      # AI 分析默认 max tokens
    ai-max-stem-chars: 8000           # 题干截断长度
    ai-max-single-answer-chars: 2000  # 单答案截断长度
    ai-max-answers: 6                 # 最多参考答案数
