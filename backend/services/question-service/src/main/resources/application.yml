spring:
  application:
    name: question-service
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  config:
    import:
      - optional:nacos:${spring.application.name}.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:qforge}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:qforge}
    password: ${MYSQL_PASSWORD:qforge}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 2000ms
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000ms

server:
  port: 8089

security:
  swagger-public: false

clients:
  ocr:
    base-url: ${OCR_SERVICE_BASE_URL:http://localhost:8090}  # 保留供直连降级使用，Feign 已切换为 Nacos LB

# 业务参数热配置 — 可在 Nacos 的 question-service.yml 中覆盖，无需重启
qforge:
  business:
    max-inline-images: 10            # 每题最多内联图片数
    max-image-binary-bytes: 524288   # 每张图片字节上限（512 KB）
    max-reasoning-length: 1024       # AI 推理文本截断长度
    max-error-message-length: 2048   # AI 错误信息截断长度
    task-state-ttl-minutes: 30       # AI/OCR 任务热状态 TTL（分钟）
    answer-ocr-guard-ttl-minutes: 10 # 答案 OCR 防重 TTL（分钟）
    answer-ocr-asset-ttl-hours: 6    # 答案 OCR 资产缓存 TTL（小时）
    asset-cache-ttl-seconds: 30      # OCR 结果图片缓存 TTL（秒）
    max-exam-upload-files: 10        # 试卷上传最大文件数
    allowed-exam-extensions: pdf,jpg,jpeg,png  # 允许的文件扩展名
    ws-allowed-origins: "*"          # WebSocket 允许的 Origin 模式

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
