spring:
  application:
    name: exam-parse-service
  config:
    import:
      - optional:nacos:${spring.application.name}.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:qforge}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true
    username: ${MYSQL_USER:qforge}
    password: ${MYSQL_PASSWORD:qforge}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8094}

security:
  swagger-public: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

qforge:
  storage:
    backend: ${QFORGE_STORAGE_BACKEND:cos}
    cos:
      bucket: ${QFORGE_STORAGE_COS_BUCKET:qforge-2026-1304896342}
      region: ${QFORGE_STORAGE_COS_REGION:ap-shanghai}
      endpoint: ${QFORGE_STORAGE_COS_ENDPOINT:https://qforge-2026-1304896342.cos.ap-shanghai.myqcloud.com}
      secret-id: ${QFORGE_STORAGE_COS_SECRET_ID:}
      secret-key: ${QFORGE_STORAGE_COS_SECRET_KEY:}
  business:
    max-exam-upload-files: 10
    allowed-exam-extensions: pdf,jpg,jpeg,png
