server:
  port: 8085

spring:
  application:
    name: ai-service

# ZhipuAI 官方 SDK 配置
zhipuai:
  # 格式：id.secret （官方 SDK 内部自动签名 JWT）
  # 生产环境请改用环境变量 ZHIPUAI_API_KEY 覆盖
  api-key: ${ZHIPUAI_API_KEY:9d94bc7088374d1596120c5930bc13d7.jUWvkwd5OgTHrkfR}
  model: glm-5
  temperature: 0.7
  max-tokens: 1024
  # 请求超时（毫秒）
  timeout: 30000

management:
  endpoints:
    web:
      exposure:
        include: health,info
