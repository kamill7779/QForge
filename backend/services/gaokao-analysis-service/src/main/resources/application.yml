spring:
  application:
    name: gaokao-analysis-service
  config:
    import:
      - optional:nacos:${spring.application.name}.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:qforge}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true
    username: ${MYSQL_USER:qforge}
    password: ${MYSQL_PASSWORD:qforge}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  ai:
    zhipuai:
      api-key: ${ZHIPUAI_API_KEY:}
      chat:
        options:
          model: ${qforge.analysis.ai-model:glm-4-plus}
          temperature: 0.1
          response-format:
            type: json_object
      embedding:
        options:
          model: ${qforge.analysis.embedding-model:embedding-3}
          dimensions: ${qforge.analysis.embedding-dimension:1024}

server:
  port: ${SERVER_PORT:8096}

security:
  swagger-public: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

qforge:
  analysis:
    ai-model: glm-4-plus
    ai-timeout-seconds: 120
    embedding-model: embedding-3
    embedding-dimension: 1024
  qdrant:
    host: ${QDRANT_HOST:localhost}
    port: ${QDRANT_PORT:6333}
    question-collection: gk_question_vectors
    chunk-collection: gk_rag_chunks
