spring:
  application:
    name: gateway-service
  config:
    import:
      - optional:nacos:${spring.application.name}.yml
  http:
    codec:
      max-in-memory-size: ${GATEWAY_MAX_MEMORY_SIZE:100MB}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yml
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service-route
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1
            - id: exam-parse-route
              uri: lb://exam-parse-service
              predicates:
                - Path=/api/exam-parse/**
            - id: exam-service-route
              uri: lb://exam-service
              predicates:
                - Path=/api/exam-papers/**,/api/question-types/**
            - id: question-basket-service-route
              uri: lb://question-basket-service
              predicates:
                - Path=/api/question-basket/**
            - id: question-core-route
              uri: lb://question-core-service
              predicates:
                - Path=/api/questions/**,/api/ocr-tasks/**,/api/tags/**
            - id: question-core-ws-route
              uri: lb:ws://question-core-service
              predicates:
                - Path=/ws/questions/**
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${SERVER_PORT:8080}

security:
  swagger-public: false
  jwt:
    secret: ${JWT_SECRET:qforge-super-secret-key-please-change-in-production-1234567890}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
