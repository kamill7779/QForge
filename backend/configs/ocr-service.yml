# ============================================================
# ocr-service.yml — Nacos 配置（Data ID: ocr-service.yml）
# ============================================================
# @ConfigurationProperties 标注属性支持热更新，无需重启服务。

# ─── GLM OCR 布局解析 ───
ocr:
  provider:
    glm:
      endpoint: ${GLM_OCR_ENDPOINT:https://api.z.ai/api/paas/v4/layout_parsing}
      model: ${GLM_OCR_MODEL:glm-ocr}
      api-key: ${GLM_OCR_API_KEY:}
      image-mime-type: ${GLM_OCR_IMAGE_MIME_TYPE:image/png}
      timeout-seconds: ${GLM_OCR_TIMEOUT_SECONDS:60}
      retry-max-attempts: ${GLM_OCR_RETRY_MAX_ATTEMPTS:3}
      retry-backoff-millis: ${GLM_OCR_RETRY_BACKOFF_MILLIS:800}
      prefer-ipv4: ${GLM_OCR_PREFER_IPV4:true}

# ─── ZhipuAI 推理模型（标签/难度/分析） ───
zhipuai:
  api-key: ${ZHIPUAI_API_KEY:}
  model: ${ZHIPUAI_MODEL:glm-5}
  temperature: 0.1
  max-tokens: 65536

# ─── StemXml 转换模型（快速/稳定/非推理） ───
stemxml:
  model: ${STEMXML_MODEL:glm-4-0520}
  temperature: 0.1
  max-tokens: 65536

# ─── AnswerXml 转换模型 ───
answerxml:
  model: ${ANSWERXML_MODEL:glm-4-0520}
  temperature: 0.1
  max-tokens: 65536

# ─── 试卷自动解析 LLM（128K context） ───
examparse:
  ai:
    model: ${EXAMPARSE_AI_MODEL:glm-4-plus}
    temperature: 0.1
    max-tokens: 32768

# ─── OCR 业务参数热配置 ───
qforge:
  storage:
    backend: cos
    cos:
      bucket: ${QFORGE_STORAGE_COS_BUCKET:qforge-2026-1304896342}
      region: ${QFORGE_STORAGE_COS_REGION:ap-shanghai}
      endpoint: ${QFORGE_STORAGE_COS_ENDPOINT:https://qforge-2026-1304896342.cos.ap-shanghai.myqcloud.com}
      secret-id: ${QFORGE_STORAGE_COS_SECRET_ID:}
      secret-key: ${QFORGE_STORAGE_COS_SECRET_KEY:}
  ocr:
    pdf-render-dpi: 300                # PDF 渲染 DPI（影响图像质量和大小）
    llm-empty-retries: 2              # LLM 返回空内容时的重试次数
    ai-default-max-tokens: 65536      # AI 分析任务默认 max tokens
    ai-max-stem-chars: 8000           # 题干文本截断长度（字符）
    ai-max-single-answer-chars: 2000  # 单个答案截断长度（字符）
    ai-max-answers: 6                 # 最多参考答案条数

spring:
  rabbitmq:
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          initial-interval: 2000ms
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000ms
